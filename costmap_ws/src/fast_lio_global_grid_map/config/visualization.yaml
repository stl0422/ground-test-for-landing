grid_map_topic: /global_grid_map

grid_map_visualizations:
  - name: elevation_points
    type: point_cloud
    params:
      layer: elevation

  - name: elevation_grid
    type: occupancy_grid
    params:
      layer: elevation
      data_min: -1.8
      data_max: 5.0

  - name: map_region
    type: map_region
    params:
      color: 3289650
      line_width: 0.03
